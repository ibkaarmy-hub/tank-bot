<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Magaloser</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
  body { background:#1a1a2e; color:#fff; font-family:system-ui,sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #hud { position:fixed; top:20px; left:0; right:0; display:flex; justify-content:space-around; font-size:18px; font-weight:bold; z-index:10; }
  #game { position:relative; width:100%; max-width:500px; height:70vh; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  #combo { position:fixed; top:60px; left:50%; transform:translateX(-50%); font-size:14px; color:#ffd700; }
  #gameover { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
  #gameover.show { display:flex; }
  button { background:#e63946; color:#fff; border:none; padding:15px 40px; font-size:18px; border-radius:8px; margin-top:20px; cursor:pointer; }
</style>
</head>
<body>
<div id="hud"><div>Score: <span id="score">0</span></div><div>High: <span id="high">0</span></div><div>Wave: <span id="wave">1</span></div></div>
<div id="combo"></div>
<div id="game"><canvas id="c"></canvas></div>
<div id="gameover"><h1>You let him win!</h1><p>Final score: <span id="final">0</span></p><button onclick="restart()">Try again</button></div>

<script>
const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand();
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W, H;
function resize(){ const r=canvas.getBoundingClientRect(); canvas.width=r.width; canvas.height=r.height; W=r.width; H=r.height; }
resize(); window.addEventListener('resize', resize);

let score=0, wave=1, hp=10, maxHp=10, combo=0, lastTap=0, gameOver=false;
let high = +localStorage.getItem('magaloser_high') || 0;
document.getElementById('high').textContent = high;
let pieces = []; // flying lego pieces

// the block-style figure
const fig = { x:0, y:0, w:120, h:160, shake:0, flash:0 };
function placeFig(){ fig.x = W/2 - fig.w/2; fig.y = H/2 - fig.h/2; }
placeFig(); window.addEventListener('resize', placeFig);

function drawFig(){
  ctx.save();
  ctx.translate(fig.shake?(Math.random()-0.5)*8:0, 0);
  const x=fig.x, y=fig.y, w=fig.w, h=fig.h;
  // body (blue suit)
  ctx.fillStyle = fig.flash ? '#fff' : '#1e3a8a';
  ctx.fillRect(x, y+h*0.4, w, h*0.55);
  // red tie
  ctx.fillStyle = '#dc2626';
  ctx.fillRect(x+w*0.42, y+h*0.4, w*0.16, h*0.5);
  // head (skin)
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(x+w*0.2, y+h*0.1, w*0.6, h*0.32);
  // yellow hair
  ctx.fillStyle = '#fde047';
  ctx.fillRect(x+w*0.15, y, w*0.7, h*0.15);
  ctx.fillRect(x+w*0.1, y+h*0.05, w*0.2, h*0.1);
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x+w*0.32, y+h*0.22, w*0.08, h*0.04);
  ctx.fillRect(x+w*0.6, y+h*0.22, w*0.08, h*0.04);
  // frown
  ctx.fillRect(x+w*0.35, y+h*0.34, w*0.3, h*0.02);
  // lego studs on top of head
  ctx.fillStyle = '#facc15';
  for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(x+w*0.25+i*w*0.25, y-5, 6, 0, Math.PI*2); ctx.fill(); }
  // hp bar
  ctx.fillStyle='#333'; ctx.fillRect(x, y-25, w, 8);
  ctx.fillStyle='#22c55e'; ctx.fillRect(x, y-25, w*(hp/maxHp), 8);
  ctx.restore();
}

function spawnPieces(tx, ty){
  const colors = ['#1e3a8a','#dc2626','#fde047','#fbbf24'];
  for(let i=0;i<8;i++){
    pieces.push({
      x:tx, y:ty,
      vx:(Math.random()-0.5)*12,
      vy:-Math.random()*10-3,
      w:8+Math.random()*10, h:8+Math.random()*10,
      color: colors[(Math.random()*colors.length)|0],
      rot:0, vr:(Math.random()-0.5)*0.4,
      life:60
    });
  }
}

function updatePieces(){
  for(let p of pieces){ p.vy += 0.5; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--; }
  pieces = pieces.filter(p=>p.life>0 && p.y < H+50);
}
function drawPieces(){
  for(let p of pieces){
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  }
}

function tapAt(x,y){
  if(gameOver) return;
  if(x>=fig.x && x<=fig.x+fig.w && y>=fig.y && y<=fig.y+fig.h){
    hp--;
    const now = Date.now();
    if(now - lastTap < 400){ combo++; } else { combo=0; }
    lastTap = now;
    const points = 10 + combo*5;
    score += points;
    document.getElementById('score').textContent = score;
    document.getElementById('combo').textContent = combo>1?`COMBO x${combo+1}!`:'';
    fig.shake = 8; fig.flash = 4;
    spawnPieces(x,y);
    tg?.HapticFeedback?.impactOccurred('medium');
    if(hp<=0) nextWave();
  } else {
    combo = 0;
    document.getElementById('combo').textContent = '';
  }
}

function nextWave(){
  wave++;
  document.getElementById('wave').textContent = wave;
  maxHp = 10 + wave*3;
  hp = maxHp;
  // explode current figure fully
  for(let i=0;i<25;i++) spawnPieces(fig.x+fig.w/2+(Math.random()-0.5)*fig.w, fig.y+fig.h/2+(Math.random()-0.5)*fig.h);
  tg?.HapticFeedback?.notificationOccurred('success');
}

let timeLeft = 30; // seconds per wave-ish — actually total game timer
let lastTime = performance.now();
function loop(now){
  const dt = (now-lastTime)/1000; lastTime=now;
  if(!gameOver){
    timeLeft -= dt;
    if(timeLeft<=0){ end(); }
  }
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,W,H);
  // timer bar
  ctx.fillStyle='#333'; ctx.fillRect(20,H-20,W-40,6);
  ctx.fillStyle = timeLeft<10?'#dc2626':'#22c55e';
  ctx.fillRect(20,H-20,(W-40)*Math.max(0,timeLeft/30),6);
  drawFig();
  updatePieces(); drawPieces();
  if(fig.shake>0) fig.shake--;
  if(fig.flash>0) fig.flash--;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function end(){
  gameOver = true;
  if(score > high){ high = score; localStorage.setItem('magaloser_high', high); }
  document.getElementById('final').textContent = score;
  document.getElementById('gameover').classList.add('show');
}
function restart(){
  score=0; wave=1; hp=10; maxHp=10; combo=0; timeLeft=30; gameOver=false; pieces=[];
  document.getElementById('score').textContent=0;
  document.getElementById('wave').textContent=1;
  document.getElementById('high').textContent=high;
  document.getElementById('gameover').classList.remove('show');
}

canvas.addEventListener('pointerdown', e=>{
  const r = canvas.getBoundingClientRect();
  tapAt(e.clientX-r.left, e.clientY-r.top);
});
</script>
</body>
</html>
