<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Magaloser</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
  body{background:linear-gradient(180deg,#87ceeb 0%,#4a90c2 100%);color:#fff;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center}
  #hud{position:fixed;top:15px;left:0;right:0;display:flex;justify-content:space-around;font-size:16px;font-weight:bold;z-index:10;text-shadow:2px 2px 0 #000}
  #combo{position:fixed;top:55px;left:50%;transform:translateX(-50%);font-size:20px;color:#ffd700;font-weight:bold;text-shadow:2px 2px 0 #000;pointer-events:none}
  canvas{display:block;width:100vw;height:100vh;touch-action:none}
  #gameover{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
  #gameover.show{display:flex}
  button{background:#dc2626;color:#fff;border:3px solid #fff;padding:15px 40px;font-size:18px;border-radius:8px;margin-top:20px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>
<div id="hud"><div>SCORE: <span id="score">0</span></div><div>HIGH: <span id="high">0</span></div><div>WAVE: <span id="wave">1</span></div></div>
<div id="combo"></div>
<canvas id="c"></canvas>
<div id="gameover"><h1>TIME'S UP!</h1><p style="margin-top:10px">Final score: <span id="final">0</span></p><button onclick="restart()">SMASH AGAIN</button></div>

<script>
const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand();

// ===== OINK SOUND =====
let audioCtx;
function oink(){
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const variations = [1, 1.1, 0.9, 1.2, 0.85];
    const pitchMod = variations[(Math.random()*variations.length)|0];

    const o1 = audioCtx.createOscillator();
    const g1 = audioCtx.createGain();
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(180*pitchMod, now);
    o1.frequency.exponentialRampToValueAtTime(280*pitchMod, now+0.08);
    g1.gain.setValueAtTime(0, now);
    g1.gain.linearRampToValueAtTime(0.3, now+0.02);
    g1.gain.exponentialRampToValueAtTime(0.01, now+0.1);
    o1.connect(g1); g1.connect(audioCtx.destination);
    o1.start(now); o1.stop(now+0.1);

    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = 'square';
    o2.frequency.setValueAtTime(320*pitchMod, now+0.11);
    o2.frequency.exponentialRampToValueAtTime(150*pitchMod, now+0.22);
    g2.gain.setValueAtTime(0, now+0.11);
    g2.gain.linearRampToValueAtTime(0.25, now+0.13);
    g2.gain.exponentialRampToValueAtTime(0.01, now+0.22);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(now+0.11); o2.stop(now+0.22);

    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.08, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now+0.15);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
    noise.start(now); noise.stop(now+0.15);
  } catch(e){}
}

const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W, H;
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; W=innerWidth; H=innerHeight; placeFig(); }

let score=0, wave=1, hp=10, maxHp=10, combo=0, lastTap=0, gameOver=false;
let high = +localStorage.getItem('magaloser_high') || 0;
let pieces = [];
const fig = { x:0, y:0, scale:1, shake:0, flash:0, bounce:0 };

function placeFig(){
  fig.scale = Math.min(W,H)/500;
  fig.x = W/2;
  fig.y = H/2 + 40*fig.scale;
}

function drawBlock(cx, cy, w, h, d, colorTop, colorLeft, colorRight, studs=0){
  ctx.fillStyle = colorTop;
  ctx.beginPath();
  ctx.moveTo(cx - w/2, cy - h/2);
  ctx.lineTo(cx + w/2, cy - h/2);
  ctx.lineTo(cx + w/2 + d*0.5, cy - h/2 - d*0.4);
  ctx.lineTo(cx - w/2 + d*0.5, cy - h/2 - d*0.4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = colorLeft;
  ctx.fillRect(cx - w/2, cy - h/2, w, h);
  ctx.fillStyle = colorRight;
  ctx.beginPath();
  ctx.moveTo(cx + w/2, cy - h/2);
  ctx.lineTo(cx + w/2 + d*0.5, cy - h/2 - d*0.4);
  ctx.lineTo(cx + w/2 + d*0.5, cy + h/2 - d*0.4);
  ctx.lineTo(cx + w/2, cy + h/2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(cx - w/2, cy - h/2, w, h);
  if(studs > 0){
    for(let i=0; i<studs; i++){
      const sx = cx - w/2 + (w/(studs+1))*(i+1) + d*0.25;
      const sy = cy - h/2 - d*0.2;
      ctx.fillStyle = colorTop;
      ctx.beginPath(); ctx.ellipse(sx, sy, w/(studs*2.5), w/(studs*4), 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.ellipse(sx-2, sy-1, w/(studs*5), w/(studs*8), 0, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawFig(){
  ctx.save();
  const s = fig.scale;
  const sx = fig.shake ? (Math.random()-0.5)*10 : 0;
  const sy = fig.bounce > 0 ? -Math.sin(fig.bounce/10*Math.PI)*15 : 0;
  ctx.translate(fig.x + sx, fig.y + sy);

  // ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 130*s, 80*s, 20*s, 0, 0, Math.PI*2); ctx.fill();

  // legs
  drawBlock(-25*s, 100*s, 28*s, 50*s, 25*s, '#1e3a8a', '#1e3a8a', '#15296b');
  drawBlock(25*s, 100*s, 28*s, 50*s, 25*s, '#1e3a8a', '#1e3a8a', '#15296b');

  // torso
  drawBlock(0, 35*s, 90*s, 70*s, 40*s, '#1e40af', '#1e3a8a', '#15296b');
  // white shirt
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(-12*s, 5*s); ctx.lineTo(12*s, 5*s); ctx.lineTo(0, 50*s); ctx.closePath(); ctx.fill();
  // red tie
  ctx.fillStyle = '#dc2626';
  ctx.beginPath();
  ctx.moveTo(-5*s, 10*s); ctx.lineTo(5*s, 10*s);
  ctx.lineTo(8*s, 65*s); ctx.lineTo(0, 72*s); ctx.lineTo(-8*s, 65*s);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#991b1b'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#dc2626'; ctx.fillRect(-6*s, 5*s, 12*s, 10*s);

  // arms
  drawBlock(-55*s, 35*s, 22*s, 60*s, 22*s, '#1e40af', '#1e3a8a', '#15296b');
  drawBlock(55*s, 35*s, 22*s, 60*s, 22*s, '#1e40af', '#1e3a8a', '#15296b');
  // hands
  drawBlock(-55*s, 75*s, 18*s, 18*s, 18*s, '#fdba74', '#fb923c', '#ea580c');
  drawBlock(55*s, 75*s, 18*s, 18*s, 18*s, '#fdba74', '#fb923c', '#ea580c');

  // head
  const headColor = fig.flash > 0 ? '#fff' : '#fdba74';
  drawBlock(0, -35*s, 70*s, 65*s, 50*s, headColor, fig.flash>0?'#fff':'#fb923c', fig.flash>0?'#fff':'#ea580c');

  // yellow swoop hair
  ctx.fillStyle = '#fde047';
  ctx.beginPath();
  ctx.moveTo(-35*s, -50*s);
  ctx.quadraticCurveTo(-40*s, -40*s, -38*s, -30*s);
  ctx.lineTo(-30*s, -28*s);
  ctx.quadraticCurveTo(-32*s, -45*s, -35*s, -50*s);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(35*s, -50*s);
  ctx.quadraticCurveTo(40*s, -40*s, 38*s, -30*s);
  ctx.lineTo(30*s, -28*s);
  ctx.quadraticCurveTo(32*s, -45*s, 35*s, -50*s);
  ctx.fill();
  ctx.fillRect(-36*s, -25*s, 6*s, 12*s);
  ctx.fillRect(30*s, -25*s, 6*s, 12*s);

  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-20*s, -38*s, 12*s, 6*s);
  ctx.fillRect(8*s, -38*s, 12*s, 6*s);
  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(-16*s, -37*s, 5*s, 4*s);
  ctx.fillRect(11*s, -37*s, 5*s, 4*s);
  // angry eyebrows
  ctx.fillStyle = '#fde047';
  ctx.save(); ctx.translate(-14*s, -45*s); ctx.rotate(-0.2);
  ctx.fillRect(-10*s, 0, 18*s, 4*s); ctx.restore();
  ctx.save(); ctx.translate(14*s, -45*s); ctx.rotate(0.2);
  ctx.fillRect(-8*s, 0, 18*s, 4*s); ctx.restore();

  // PIG SNOUT
  ctx.fillStyle = '#f9a8d4';
  ctx.beginPath();
  ctx.ellipse(0, -12*s, 22*s, 14*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#be185d'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#ec4899';
  ctx.beginPath();
  ctx.ellipse(8*s, -10*s, 14*s, 11*s, 0, -Math.PI/3, Math.PI/3);
  ctx.fill();
  ctx.fillStyle = '#7f1d1d';
  ctx.beginPath(); ctx.ellipse(-7*s, -12*s, 3*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7*s, -12*s, 3*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.ellipse(-6*s, -16*s, 5*s, 2*s, 0, 0, Math.PI*2); ctx.fill();

  // small frown below snout
  ctx.strokeStyle = '#7c2d12'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 5*s, 8*s, Math.PI*1.2, Math.PI*1.8);
  ctx.stroke();

  // RED MAGA CAP
  ctx.fillStyle = '#991b1b';
  ctx.beginPath();
  ctx.ellipse(-5*s, -62*s, 45*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#dc2626';
  ctx.beginPath();
  ctx.moveTo(-38*s, -65*s);
  ctx.quadraticCurveTo(-38*s, -95*s, 0, -98*s);
  ctx.quadraticCurveTo(38*s, -95*s, 38*s, -65*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#991b1b';
  ctx.beginPath();
  ctx.moveTo(15*s, -65*s);
  ctx.quadraticCurveTo(38*s, -85*s, 38*s, -65*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${14*s}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('MAGA', 0, -78*s);

  // HP bar
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(-50*s, -120*s, 100*s, 8*s);
  ctx.fillStyle = hp/maxHp > 0.5 ? '#22c55e' : hp/maxHp > 0.25 ? '#eab308' : '#dc2626';
  ctx.fillRect(-50*s, -120*s, 100*s*(hp/maxHp), 8*s);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(-50*s, -120*s, 100*s, 8*s);

  ctx.restore();
}

function spawnPieces(tx, ty, count=8){
  const colors = ['#1e3a8a','#dc2626','#fde047','#fdba74','#fff','#fb923c','#f9a8d4'];
  for(let i=0;i<count;i++){
    pieces.push({
      x:tx, y:ty,
      vx:(Math.random()-0.5)*14,
      vy:-Math.random()*12-4,
      w:(8+Math.random()*12)*fig.scale, h:(8+Math.random()*12)*fig.scale,
      color: colors[(Math.random()*colors.length)|0],
      rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.5,
      life:80
    });
  }
}
function updatePieces(){ for(let p of pieces){p.vy+=0.6;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--} pieces=pieces.filter(p=>p.life>0&&p.y<H+50) }
function drawPieces(){
  for(let p of pieces){
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(p.w/4,-p.h/2,p.w/4,p.h);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  }
}

function tapAt(x,y){
  if(gameOver) return;
  const s = fig.scale;
  if(x>=fig.x-90*s && x<=fig.x+90*s && y>=fig.y-130*s && y<=fig.y+130*s){
    hp--;
    const now = Date.now();
    if(now - lastTap < 400){ combo++; } else { combo=0; }
    lastTap = now;
    score += 10 + combo*5;
    document.getElementById('score').textContent = score;
    document.getElementById('combo').textContent = combo>1?`COMBO x${combo+1}!`:'';
    fig.shake = 8; fig.flash = 4;
    spawnPieces(x,y);
    tg?.HapticFeedback?.impactOccurred('medium');
    oink();
    if(hp<=0) nextWave();
  } else {
    combo = 0;
    document.getElementById('combo').textContent = '';
  }
}

function nextWave(){
  wave++;
  document.getElementById('wave').textContent = wave;
  maxHp = 10 + wave*3;
  hp = maxHp;
  for(let i=0;i<25;i++) spawnPieces(fig.x+(Math.random()-0.5)*100*fig.scale, fig.y+(Math.random()-0.5)*200*fig.scale, 1);
  fig.bounce = 20;
  tg?.HapticFeedback?.notificationOccurred('success');
  oink(); setTimeout(oink, 150); setTimeout(oink, 300);
}

let timeLeft = 30;
let lastTime = performance.now();
function loop(now){
  const dt = (now-lastTime)/1000; lastTime=now;
  if(!gameOver){
    timeLeft -= dt;
    if(timeLeft<=0){ end(); }
  }
  // sky background
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#87ceeb'); grad.addColorStop(1,'#4a90c2');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(0, H*0.75, W, H*0.25);
  ctx.fillStyle = '#16a34a';
  for(let i=0;i<W;i+=40){ ctx.fillRect(i, H*0.75, 20, 4); }
  // timer bar
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(20,H-25,W-40,10);
  ctx.fillStyle = timeLeft<10?'#dc2626':'#22c55e';
  ctx.fillRect(20,H-25,(W-40)*Math.max(0,timeLeft/30),10);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(20,H-25,W-40,10);

  drawFig();
  updatePieces(); drawPieces();
  if(fig.shake>0) fig.shake--;
  if(fig.flash>0) fig.flash--;
  if(fig.bounce>0) fig.bounce--;
  requestAnimationFrame(loop);
}

function end(){
  gameOver = true;
  if(score > high){ high = score; localStorage.setItem('magaloser_high', high); }
  document.getElementById('final').textContent = score;
  document.getElementById('high').textContent = high;
  document.getElementById('gameover').classList.add('show');
}
function restart(){
  score=0; wave=1; hp=10; maxHp=10; combo=0; timeLeft=30; gameOver=false; pieces=[];
  document.getElementById('score').textContent=0;
  document.getElementById('wave').textContent=1;
  document.getElementById('high').textContent=high;
  document.getElementById('combo').textContent='';
  document.getElementById('gameover').classList.remove('show');
}

canvas.addEventListener('pointerdown', e=>{
  const r = canvas.getBoundingClientRect();
  tapAt(e.clientX-r.left, e.clientY-r.top);
});

resize();
window.addEventListener('resize', resize);
document.getElementById('high').textContent = high;
requestAnimationFrame(loop);
</script>
</body>
</html>
