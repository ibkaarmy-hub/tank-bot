<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Magaloser</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:#1a1a2e;color:#fff;font-family:system-ui,sans-serif}
  #hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-around;font-size:14px;font-weight:bold;z-index:10;text-shadow:2px 2px 0 #000;flex-wrap:wrap;gap:5px;padding:0 10px;pointer-events:none}
  #combo{position:fixed;top:55px;left:50%;transform:translateX(-50%);font-size:22px;color:#ffd700;font-weight:bold;text-shadow:2px 2px 0 #000;pointer-events:none}
  #levelTitle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;text-shadow:3px 3px 0 #000;z-index:15;pointer-events:none;opacity:0;transition:opacity 0.4s;text-align:center;padding:0 20px}
  #levelTitle.show{opacity:1}
  #powerup{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:bold;color:#ffd700;text-shadow:2px 2px 0 #000;pointer-events:none}
  #tapToStart{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;color:#fff;text-shadow:3px 3px 0 #000;z-index:18;pointer-events:none;text-align:center;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  #tapToStart.hide{display:none}
  canvas{position:fixed;top:0;left:0;display:block;width:100%;height:100%;touch-action:none;z-index:1}
  #screen{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
  #screen.show{display:flex}
  button{background:#dc2626;color:#fff;border:3px solid #fff;padding:15px 40px;font-size:18px;border-radius:8px;margin-top:15px;cursor:pointer;font-weight:bold;pointer-events:auto}
  h1{font-size:34px;margin-bottom:10px}
  h2{font-size:20px;color:#ffd700;margin-bottom:5px}
  p{margin:5px 0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div>LVL <span id="level">1</span></div>
  <div>SCORE: <span id="score">0</span></div>
  <div>HIGH: <span id="high">0</span></div>
  <div>WAVE: <span id="wave">1</span>/4</div>
</div>
<div id="combo"></div>
<div id="levelTitle"></div>
<div id="powerup"></div>
<div id="tapToStart">TAP TRUMP TO START!</div>

<div id="screen">
  <h1 id="screenTitle">GAME OVER</h1>
  <h2 id="screenSub"></h2>
  <p>Score: <span id="final">0</span></p>
  <p>High Score: <span id="finalHigh">0</span></p>
  <button id="actionBtn" onclick="action()">CONTINUE</button>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp; if(tg){tg.ready();tg.expand();}

let audioCtx;
function A(){return audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)()}
function oink(pitch){pitch=pitch||1;try{const a=A(),n=a.currentTime,v=[1,1.1,0.9,1.2,0.85][(Math.random()*5)|0]*pitch;
  const o1=a.createOscillator(),g1=a.createGain();o1.type='sawtooth';
  o1.frequency.setValueAtTime(180*v,n);o1.frequency.exponentialRampToValueAtTime(280*v,n+0.08);
  g1.gain.setValueAtTime(0,n);g1.gain.linearRampToValueAtTime(0.25,n+0.02);g1.gain.exponentialRampToValueAtTime(0.01,n+0.1);
  o1.connect(g1);g1.connect(a.destination);o1.start(n);o1.stop(n+0.1);
  const o2=a.createOscillator(),g2=a.createGain();o2.type='square';
  o2.frequency.setValueAtTime(320*v,n+0.11);o2.frequency.exponentialRampToValueAtTime(150*v,n+0.22);
  g2.gain.setValueAtTime(0,n+0.11);g2.gain.linearRampToValueAtTime(0.2,n+0.13);g2.gain.exponentialRampToValueAtTime(0.01,n+0.22);
  o2.connect(g2);g2.connect(a.destination);o2.start(n+0.11);o2.stop(n+0.22);}catch(e){}}
function growl(){try{const a=A(),n=a.currentTime;
  const o=a.createOscillator(),g=a.createGain();o.type='sawtooth';
  o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(50,n+0.4);
  g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.4);
  o.connect(g);g.connect(a.destination);o.start(n);o.stop(n+0.4);}catch(e){}}
function bonk(f){f=f||300;try{const a=A(),n=a.currentTime;
  const o=a.createOscillator(),g=a.createGain();o.type='triangle';
  o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*0.3,n+0.1);
  g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);
  o.connect(g);g.connect(a.destination);o.start(n);o.stop(n+0.1);}catch(e){}}
function powerSound(){try{const a=A(),n=a.currentTime;
  for(let i=0;i<4;i++){const o=a.createOscillator(),g=a.createGain();o.type='sine';
  o.frequency.setValueAtTime(400+i*200,n+i*0.05);
  g.gain.setValueAtTime(0.2,n+i*0.05);g.gain.exponentialRampToValueAtTime(0.01,n+i*0.05+0.1);
  o.connect(g);g.connect(a.destination);o.start(n+i*0.05);o.stop(n+i*0.05+0.1);}}catch(e){}}
function levelUpSnd(){try{const a=A(),n=a.currentTime;
  const notes=[400,500,600,800];
  notes.forEach(function(f,i){const o=a.createOscillator(),g=a.createGain();o.type='triangle';
  o.frequency.value=f;g.gain.setValueAtTime(0.25,n+i*0.1);g.gain.exponentialRampToValueAtTime(0.01,n+i*0.1+0.15);
  o.connect(g);g.connect(a.destination);o.start(n+i*0.1);o.stop(n+i*0.1+0.15);});}catch(e){}}

function drawBlock(cx,cy,w,h,d,top,front,right){
  ctx.fillStyle=top;ctx.beginPath();
  ctx.moveTo(cx-w/2,cy-h/2);ctx.lineTo(cx+w/2,cy-h/2);
  ctx.lineTo(cx+w/2+d*0.5,cy-h/2-d*0.4);ctx.lineTo(cx-w/2+d*0.5,cy-h/2-d*0.4);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=front;ctx.fillRect(cx-w/2,cy-h/2,w,h);
  ctx.fillStyle=right;ctx.beginPath();
  ctx.moveTo(cx+w/2,cy-h/2);ctx.lineTo(cx+w/2+d*0.5,cy-h/2-d*0.4);
  ctx.lineTo(cx+w/2+d*0.5,cy+h/2-d*0.4);ctx.lineTo(cx+w/2,cy+h/2);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
  ctx.strokeRect(cx-w/2,cy-h/2,w,h);
}

function drawTrump(s,flash){
  drawBlock(-25*s,100*s,28*s,50*s,25*s,'#1e3a8a','#1e3a8a','#15296b');

  drawBlock(0,-35*s,70*s,65*s,50*s,hc,flash?'#fff':'#fb923c',flash?'#fff':'#ea580c');
  ctx.fillStyle='#fde047';
  ctx.beginPath();ctx.moveTo(-35*s,-50*s);ctx.quadraticCurveTo(-40*s,-40*s,-38*s,-30*s);
  ctx.lineTo(-30*s,-28*s);ctx.quadraticCurveTo(-32*s,-45*s,-35*s,-50*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(35*s,-50*s);ctx.quadraticCurveTo(40*s,-40*s,38*s,-30*s);
  ctx.lineTo(30*s,-28*s);ctx.quadraticCurveTo(32*s,-45*s,35*s,-50*s);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(-20*s,-38*s,12*s,6*s);ctx.fillRect(8*s,-38*s,12*s,6*s);
  ctx.fillStyle='#1e3a8a';ctx.fillRect(-16*s,-37*s,5*s,4*s);ctx.fillRect(11*s,-37*s,5*s,4*s);
  ctx.fillStyle='#f9a8d4';ctx.beginPath();ctx.ellipse(0,-12*s,22*s,14*s,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#be185d';ctx.lineWidth=2;ctx.stroke();

  ctx.beginPath();ctx.ellipse(7*s,-12*s,3*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#991b1b';ctx.beginPath();ctx.ellipse(-5*s,-62*s,45*s,8*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#dc2626';ctx.beginPath();
  ctx.moveTo(-38*s,-65*s);ctx.quadraticCurveTo(-38*s,-95*s,0,-98*s);
  ctx.quadraticCurveTo(38*s,-95*s,38*s,-65*s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold '+(14*s)+'px Arial';ctx.textAlign='center';ctx.fillText('MAGA',0,-78*s);
}
function drawLobbyist(s,flash){
  drawBlock(-22*s,90*s,25*s,45*s,22*s,'#1f2937','#111827','#030712');

  ctx.fillStyle='#fff';ctx.fillRect(-15*s,-32*s,8*s,5*s);ctx.fillRect(7*s,-32*s,8*s,5*s);

  ctx.beginPath();ctx.moveTo(10*s,-15*s);ctx.lineTo(14*s,-15*s);ctx.lineTo(12*s,-7*s);ctx.closePath();ctx.fill();
}

function spawnEnemy(type,x,y){
  const cfg=ENEMY_TYPES[type];
  const lvl=LEVELS[level-1];
  const hpMul=(lvl.hpMul||1);
  const speedMul=(lvl.speedMul||1);
  const isBoss=cfg.boss;
  enemies.push({type:type,x:x,y:y,
    vx:(Math.random()-0.5)*cfg.speed*60*(isBoss?1:speedMul),
    vy:(Math.random()-0.5)*cfg.speed*60*(isBoss?1:speedMul),
    hp:Math.ceil(cfg.hp*(isBoss?1:hpMul)),
    maxHp:Math.ceil(cfg.hp*(isBoss?1:hpMul)),
    size:cfg.size*Math.min(W,H)/700,
    flash:0,shake:0,bobPhase:Math.random()*Math.PI*2});
}
function spawnRandomEnemy(){
  const lvl=LEVELS[level-1];
  const t=lvl.types[(Math.random()*lvl.types.length)|0];
  const margin=120;
  const x=margin+Math.random()*Math.max(1,W-margin*2);
  const y=margin+Math.random()*Math.max(1,H-margin*2-100);
  spawnEnemy(t,x,y);
}

function drawEnemy(e){
  ctx.save();
  const sx=e.shake?(Math.random()-0.5)*8:0;
  const bob=Math.sin(e.bobPhase)*4;
  ctx.translate(e.x+sx,e.y+bob);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(0,130*e.size,80*e.size,18*e.size,0,0,Math.PI*2);ctx.fill();
  if(e.hp<e.maxHp){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(-40*e.size,-130*e.size,80*e.size,6*e.size);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#22c55e':e.hp/e.maxHp>0.25?'#eab308':'#dc2626';
    ctx.fillRect(-40*e.size,-130*e.size,80*e.size*(e.hp/e.maxHp),6*e.size);
  }
  if(e.type==='trump') drawTrump(e.size,e.flash>0);
  else if(e.type==='lobbyist') drawLobbyist(e.size,e.flash>0);
  else if(e.type==='pundit') drawPundit(e.size,e.flash>0);
  else if(e.type==='goon') drawGoon(e.size,e.flash>0);
  else if(e.type==='demon') drawDemon(e.size,e.flash>0);
  ctx.restore();
}
function updateEnemies(dt){
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    e.x+=e.vx*dt;e.y+=e.vy*dt;e.bobPhase+=dt*3;
    const margin=80*e.size;
    if(e.x<margin||e.x>W-margin) e.vx=-e.vx;
    if(e.y<margin||e.y>H-margin-50) e.vy=-e.vy;
    if(e.flash>0) e.flash--;
    if(e.shake>0) e.shake--;
  }
}

function spawnPieces(x,y,n,colors){
  n=n||8;
  colors=colors||['#1e3a8a','#dc2626','#fde047','#fdba74','#fff','#fb923c','#f9a8d4'];
  for(let i=0;i<n;i++){
    pieces.push({x:x,y:y,vx:(Math.random()-0.5)*14,vy:-Math.random()*12-4,
      w:8+Math.random()*12,h:8+Math.random()*12,
      color:colors[(Math.random()*colors.length)|0],
      rot:Math.random()*Math.PI,vr:(Math.random()-0.5)*0.5,life:80});
  }
}
function updatePieces(){
  for(let i=0;i<pieces.length;i++){const p=pieces[i];p.vy+=0.6;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--}
  pieces=pieces.filter(function(p){return p.life>0&&p.y<H+50});
}
function drawPieces(){
  for(let i=0;i<pieces.length;i++){
    const p=pieces[i];
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(p.w/4,-p.h/2,p.w/4,p.h);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
    ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  }
}

const POWERUPS=['2x','slow','mega'];
function spawnPowerup(x,y){
  powerups.push({x:x,y:y,vy:0,type:POWERUPS[(Math.random()*3)|0],life:300,bob:0});
}
function updatePowerups(dt){
  for(let i=0;i<powerups.length;i++){powerups[i].bob+=dt*4;powerups[i].life--}
  powerups=powerups.filter(function(p){return p.life>0});
}
function drawPowerups(){
  for(let i=0;i<powerups.length;i++){
    const p=powerups[i];
    ctx.save();ctx.translate(p.x,p.y+Math.sin(p.bob)*6);
    const colors={'2x':'#fbbf24','slow':'#3b82f6','mega':'#a855f7'};
    const labels={'2x':'2X','slow':'SLO','mega':'MEGA'};
    ctx.fillStyle=colors[p.type];
    ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(labels[p.type],0,0);
    ctx.restore();
  }
}
function activatePower(type){
  activePower=type;
  powerEndsAt=performance.now()+(type==='mega'?500:6000);
  document.getElementById('powerup').textContent=
    type==='2x'?'2X SCORE':type==='slow'?'SLOW MOTION':'MEGA SMASH';
  powerSound();
  if(type==='mega'){
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];
      score+=ENEMY_TYPES[e.type].points*e.maxHp;
      spawnPieces(e.x,e.y,20);
    }
    enemies=[];
  }
}

function floatText(x,y,text,color){
  floatingTexts.push({x:x,y:y,text:text,color:color||'#fff',life:60,vy:-2});
}
function updateFloatingTexts(){
  for(let i=0;i<floatingTexts.length;i++){floatingTexts[i].y+=floatingTexts[i].vy;floatingTexts[i].life--}
  floatingTexts=floatingTexts.filter(function(f){return f.life>0});
}
function drawFloatingTexts(){
  for(let i=0;i<floatingTexts.length;i++){
    const f=floatingTexts[i];
    ctx.save();ctx.globalAlpha=f.life/60;
    ctx.fillStyle=f.color;
    ctx.font='bold 22px Arial';ctx.textAlign='center';
    ctx.strokeStyle='#000';ctx.lineWidth=4;
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  }
}

function tapAt(x,y){
  if(gameOver||won) return;
  if(!timerStarted){
    timerStarted=true;
    document.getElementById('tapToStart').classList.add('hide');
  }
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(Math.hypot(x-p.x,y-p.y)<35){activatePower(p.type);powerups.splice(i,1);return;}
  }
  let hit=null,dist=Infinity;
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    const dx=x-e.x,dy=y-(e.y+20*e.size);
    const r=90*e.size;
    if(Math.abs(dx)<r&&Math.abs(dy)<130*e.size){
      const d=Math.hypot(dx,dy);
      if(d<dist){dist=d;hit=e}
    }
  }
  if(hit){
    const cfg=ENEMY_TYPES[hit.type];
    hit.hp--;hit.flash=4;hit.shake=8;
    const now=Date.now();
    if(now-lastTap<400) combo++; else combo=0;
    lastTap=now;
    let pts=cfg.points+combo*3;
    if(activePower==='2x') pts*=2;
    score+=pts;
    floatText(x,y-30,'+'+pts,combo>2?'#ffd700':'#fff');
    document.getElementById('score').textContent=score;
    document.getElementById('combo').textContent=combo>1?'COMBO x'+(combo+1)+'!':'';
    spawnPieces(x,y);
    if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    cfg.sound();
    if(hit.hp<=0){
      spawnPieces(hit.x,hit.y,20);
      if(cfg.splits&&hit.size>0.5){
        for(let j=0;j<2;j++){
          spawnEnemy('pundit',hit.x+(j?40:-40),hit.y);
          enemies[enemies.length-1].size=hit.size*0.6;
          enemies[enemies.length-1].hp=1;
          enemies[enemies.length-1].maxHp=1;
        }
      }
      if(Math.random()<0.15) spawnPowerup(hit.x,hit.y);
      if(cfg.boss){won=true;showWinScreen();}
      enemies=enemies.filter(function(e){return e!==hit});
    }
  } else {
    combo=0;
    document.getElementById('combo').textContent='';
  }
}

let lastSpawn=0;
function tick(now,dt){
  if(!timerStarted) return;
  const lvl=LEVELS[level-1];
  let bossPresent=false;
  for(let i=0;i<enemies.length;i++) if(enemies[i].type==='demon') bossPresent=true;
  if(!lvl.boss||wave<WAVES_PER_LEVEL){
    if(now-lastSpawn>lvl.spawnRate&&enemies.length<6+level){
      spawnRandomEnemy();
      lastSpawn=now;
    }
  } else if(lvl.boss&&wave===WAVES_PER_LEVEL&&!bossPresent){
    enemies=[];spawnEnemy('demon',W/2,H/2);
    showLevelTitle('BOSS: THE LOBBYIST DEMON');growl();
  }
  const waveTarget=wave*60*level;
  if(score>=waveTarget){
    if(wave<WAVES_PER_LEVEL){
      wave++;document.getElementById('wave').textContent=wave;
      showLevelTitle('WAVE '+wave);levelUpSnd();
    } else if(!LEVELS[level-1].boss) {
      won=true;
      showWinScreen();
    }
  }
  if(activePower&&now>powerEndsAt){activePower=null;document.getElementById('powerup').textContent='';}
  const slowMul=activePower==='slow'?0.4:1;
  timeLeft-=dt*slowMul;
  if(timeLeft<=0&&!won) endGame(false);
}

function showLevelTitle(text){
  const el=document.getElementById('levelTitle');
  el.textContent=text;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},1800);
}
function showWinScreen(){
  if(score>high){high=score;localStorage.setItem('magaloser_high',high)}
  const el=document.getElementById('screen');
  if(level>=TOTAL_LEVELS){
    document.getElementById('screenTitle').textContent='YOU WIN!';
    document.getElementById('screenSub').textContent='You smashed them all!';
    document.getElementById('actionBtn').textContent='PLAY AGAIN';
  } else {
    document.getElementById('screenTitle').textContent='LEVEL '+level+' CLEAR!';
    document.getElementById('screenSub').textContent=LEVELS[level]?LEVELS[level].name:'';
    document.getElementById('actionBtn').textContent='NEXT LEVEL';
  }
  document.getElementById('final').textContent=score;
  document.getElementById('finalHigh').textContent=high;
  el.classList.add('show');
}
function endGame(victory){
  gameOver=true;
  if(score>high){high=score;localStorage.setItem('magaloser_high',high)}
  const el=document.getElementById('screen');
  document.getElementById('screenTitle').textContent=victory?'VICTORY!':"TIME'S UP!";
  document.getElementById('screenSub').textContent='Made it to level '+level;
  document.getElementById('final').textContent=score;
  document.getElementById('finalHigh').textContent=high;
  document.getElementById('actionBtn').textContent='TRY AGAIN';
  el.classList.add('show');
}
function action(){
  document.getElementById('screen').classList.remove('show');
  if(won&&level<TOTAL_LEVELS){level++;won=false;startLevel();}
  else {level=1;score=0;startLevel();}
}
function startLevel(){
  const lvl=LEVELS[level-1];
  wave=1;combo=0;timeLeft=lvl.time;maxTime=lvl.time;
  enemies=[];pieces=[];powerups=[];floatingTexts=[];
  activePower=null;gameOver=false;won=false;
  timerStarted=false;
  lastSpawn=0;
  for(let i=0;i<3;i++) spawnRandomEnemy();
  document.getElementById('level').textContent=level;
  document.getElementById('wave').textContent=1;
  document.getElementById('score').textContent=score;
  document.getElementById('high').textContent=high;
  document.getElementById('combo').textContent='';
  document.getElementById('powerup').textContent='';
  document.getElementById('tapToStart').classList.remove('hide');
  showLevelTitle(lvl.name);
  levelUpSnd();
}

function loop(now){
  try {
    let dt=lastTime?Math.min(0.05,(now-lastTime)/1000):0.016;
    lastTime=now;
    if(!gameOver&&!won) tick(now,dt);
    const lvl=LEVELS[level-1];
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,lvl.bg[0]);grad.addColorStop(1,lvl.bg[1]);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,H*0.85,W,H*0.15);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(20,H-20,W-40,8);
    ctx.fillStyle=timeLeft<10?'#dc2626':'#22c55e';
    ctx.fillRect(20,H-20,(W-40)*Math.max(0,timeLeft/maxTime),8);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(20,H-20,W-40,8);
    enemies.sort(function(a,b){return a.y-b.y});
    for(let i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
    if(!gameOver&&!won&&timerStarted) updateEnemies(dt*(activePower==='slow'?0.4:1));
    updatePieces();drawPieces();
    updatePowerups(dt);drawPowerups();
    updateFloatingTexts();drawFloatingTexts();
  } catch(err){console.error('Loop error:',err);}
  requestAnimationFrame(loop);
}

// FIXED tap handler — listens on the whole window with multiple event types
function handleTap(e){
  if(document.getElementById('screen').classList.contains('show')) return;
  let cx, cy;
  if(e.touches && e.touches.length){
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  } else if(e.changedTouches && e.changedTouches.length){
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  } else {
    cx = e.clientX;
    cy = e.clientY;
  }
  if(cx === undefined || cy === undefined) return;
  tapAt(cx, cy);
  if(e.cancelable) e.preventDefault();
}
window.addEventListener('pointerdown', handleTap, {passive:false});
window.addEventListener('touchstart', handleTap, {passive:false});
window.addEventListener('mousedown', handleTap);

function startGame(){
  resize();
  document.getElementById('high').textContent=high;
  startLevel();
  requestAnimationFrame(loop);
}
if(document.readyState==='loading'){
  window.addEventListener('DOMContentLoaded',startGame);
} else {
  startGame();
}
</script>
